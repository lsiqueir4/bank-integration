services:
  db:
    image: postgres:16
    container_name: postgres_local_stark_integration
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: stark_integration
    ports:
      - "5432:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d
      - ./sql:/sql
  api:
    build:
      context: .
      dockerfile: ./src/dockerfile
    container_name: flask_api_stark_integration
    restart: always
    depends_on:
      - db
    ports:
      - "5000:5000"
    environment:
      - DB_USER=admin
      - DB_PASSWORD=admin123
      - DB_ADDRESS=db
      - DB_PORT=5432
      - DB_NAME=stark_integration
      - ENV=SANDBOX
      - DEBUG=True
    command: flask run --host=0.0.0.0

volumes:
  postgres_data: